spring.application.name=behavioral-credit-system

# 1. Database Connection (Transaction Pooler - Port 6543)
# prepareThreshold=0 is mandatory for Supabase's PgBouncer
spring.datasource.url=jdbc:postgresql://aws-1-ap-southeast-1.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0
spring.datasource.username=postgres.ldqfznhzhpxxqnwgxdmv
spring.datasource.password=BehavioralCreditSystem
spring.datasource.driver-class-name=org.postgresql.Driver

# 2. HikariCP Fix: Crucial to resolve "Cannot commit when autoCommit is enabled"
# This tells the pool to let @Transactional handle the commits
spring.datasource.hikari.auto-commit=false

# 3. JPA/Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# 4. Transaction & Connection Stability
# Disable OS-level view handling to prevent connection leaks during rendering
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# This must be false when using Hikari's auto-commit=false
spring.jpa.properties.hibernate.connection.provider_disables_autocommit=false