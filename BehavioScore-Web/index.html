<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BehavioScore | Lender Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <aside class="sidebar">
        <h2 class="brand">BehavioScore</h2>
        <p class="subtitle">Lender Control Panel</p>
        <hr class="divider">
        
        <div class="input-group">
            <label for="phone">Borrower Phone</label>
            <input type="text" id="phone" placeholder="+91 98765 43210">
            <button id="btnRequest" onclick="requestScore()">Initiate Analysis</button>
        </div>
        
        <p id="statusText" class="status-msg">Status: Ready</p>
    </aside>

    <main class="main-content">
        <section id="loadingSection" class="centered-state">
            <div class="status-badge pulse">WAITING FOR USER CONSENT...</div>
        </section>

        <section id="resultsSection" class="hidden">
            <div class="card main-card">
                <header class="card-header">
                    <h3 id="userNameDisplay">Analysis for: --</h3>
                    <div id="riskBadge" class="status-badge">RISK LEVEL</div>
                </header>
                
                <div class="metrics-grid">
                    <div class="metric-card">
                        <span class="label">SALARY STABILITY</span>
                        <span id="salaryVal" class="value">₹ 0.00</span>
                    </div>
                    <div class="metric-card">
                        <span class="label">RENT DISCIPLINE</span>
                        <span id="rentVal" class="value">--</span>
                    </div>
                    <div class="metric-card">
                        <span class="label">SAVINGS RATIO</span>
                        <span id="savingsVal" class="value">0%</span>
                    </div>
                </div>

                <div class="score-container">
                    <span class="label">FINAL CREDIT SCORE</span>
                    <h1 id="finalScore" class="big-score">---</h1>
                    <p class="sub-label">DEFAULT PROBABILITY: <span id="probVal">0%</span></p>
                </div>

                <footer class="recommendation-box">
                    <strong>Lender Recommendation:</strong>
                    <p id="lenderRecText">Awaiting analysis results from the ML Engine...</p>
                </footer>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
